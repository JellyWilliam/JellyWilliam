<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <style>
    /* ── Node drift — each node floats slightly ── */
    @keyframes d1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(3px,-2px)} 66%{transform:translate(-2px,2px)} }
    @keyframes d2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-2px,3px)} 66%{transform:translate(2px,-1px)} }
    @keyframes d3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(2px,2px)} 66%{transform:translate(-3px,-2px)} }
    @keyframes d4 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-1px,-3px)} 66%{transform:translate(3px,1px)} }
    @keyframes d5 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(2px,-1px)} 66%{transform:translate(-1px,3px)} }

    /* ── Node pulse ── */
    @keyframes pulse {
      0%,100% { r: var(--r); opacity: var(--o); }
      50%     { r: calc(var(--r) + 1.2px); opacity: calc(var(--o) + 0.12); }
    }
    /* ── Glow halo ── */
    @keyframes glow {
      0%,100% { opacity: 0; }
      50%     { opacity: 0.10; }
    }
    /* ── Signal travel ── */
    @keyframes signal {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.7; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    /* ── Edge draw ── */
    @keyframes edgeDraw {
      from { stroke-dashoffset: 600; }
      to   { stroke-dashoffset: 0; }
    }
    /* ── Text ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    .edge { stroke-dasharray:600; stroke-dashoffset:600; animation: edgeDraw 2.5s ease-out both; }
    .node { animation: pulse 3.5s ease-in-out infinite; }
    .halo { animation: glow 3.5s ease-in-out infinite; }
    .sig  { animation: signal 3s ease-in-out infinite; }

    /* Drift classes */
    .f1 { animation: d1 12s ease-in-out infinite; }
    .f2 { animation: d2 14s ease-in-out infinite; }
    .f3 { animation: d3 11s ease-in-out infinite; }
    .f4 { animation: d4 13s ease-in-out infinite; }
    .f5 { animation: d5 15s ease-in-out infinite; }

    .header-name { animation: fadeInUp 1s ease-out 0.6s both; }
    .header-role { animation: fadeInUp 1s ease-out 0.9s both; }
    .accent-bar  { transform-origin: center; animation: barGrow 0.8s ease-out 1.2s both; }

    @media (prefers-color-scheme: light) {
      .bg { fill: #f8f9fc; }
      .edge-g line { stroke-opacity: 0.10; }
      .nm { fill: #0f172a; }
      .rl { fill: #6366f1; opacity: 0.85; }
      .ab { fill: #6366f1; opacity: 0.3; }
    }
  </style>

  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect class="bg" width="1200" height="320" fill="#08080f"/>
  <rect width="1200" height="320" fill="url(#g1)"/>

  <!-- ═══ EDGES — full-background mesh ═══ -->
  <g class="edge-g" stroke="#6366f1" stroke-opacity="0.06" stroke-width="0.7" fill="none">
    <!-- Top row connections -->
    <line class="edge" x1="70"  y1="50"  x2="210" y2="35"  style="animation-delay:0s"/>
    <line class="edge" x1="210" y1="35"  x2="370" y2="60"  style="animation-delay:0.06s"/>
    <line class="edge" x1="370" y1="60"  x2="530" y2="42"  style="animation-delay:0.12s"/>
    <line class="edge" x1="530" y1="42"  x2="700" y2="55"  style="animation-delay:0.18s"/>
    <line class="edge" x1="700" y1="55"  x2="860" y2="38"  style="animation-delay:0.24s"/>
    <line class="edge" x1="860" y1="38"  x2="1010" y2="52" style="animation-delay:0.30s"/>
    <line class="edge" x1="1010" y1="52" x2="1150" y2="42" style="animation-delay:0.36s"/>

    <!-- Top → Mid connections -->
    <line class="edge" x1="70"  y1="50"  x2="110" y2="148" style="animation-delay:0.08s"/>
    <line class="edge" x1="70"  y1="50"  x2="260" y2="132" style="animation-delay:0.14s"/>
    <line class="edge" x1="210" y1="35"  x2="110" y2="148" style="animation-delay:0.20s"/>
    <line class="edge" x1="210" y1="35"  x2="260" y2="132" style="animation-delay:0.26s"/>
    <line class="edge" x1="370" y1="60"  x2="260" y2="132" style="animation-delay:0.32s"/>
    <line class="edge" x1="370" y1="60"  x2="440" y2="155" style="animation-delay:0.38s"/>
    <line class="edge" x1="530" y1="42"  x2="440" y2="155" style="animation-delay:0.44s"/>
    <line class="edge" x1="700" y1="55"  x2="770" y2="145" style="animation-delay:0.50s"/>
    <line class="edge" x1="860" y1="38"  x2="770" y2="145" style="animation-delay:0.56s"/>
    <line class="edge" x1="860" y1="38"  x2="960" y2="158" style="animation-delay:0.62s"/>
    <line class="edge" x1="1010" y1="52" x2="960" y2="158" style="animation-delay:0.68s"/>
    <line class="edge" x1="1010" y1="52" x2="1110" y2="140" style="animation-delay:0.74s"/>
    <line class="edge" x1="1150" y1="42" x2="1110" y2="140" style="animation-delay:0.80s"/>

    <!-- Mid row connections -->
    <line class="edge" x1="110" y1="148" x2="260" y2="132" style="animation-delay:0.40s"/>
    <line class="edge" x1="260" y1="132" x2="440" y2="155" style="animation-delay:0.46s"/>
    <line class="edge" x1="770" y1="145" x2="960" y2="158" style="animation-delay:0.58s"/>
    <line class="edge" x1="960" y1="158" x2="1110" y2="140" style="animation-delay:0.64s"/>

    <!-- Mid → Bottom connections -->
    <line class="edge" x1="110" y1="148" x2="65"  y2="262" style="animation-delay:0.50s"/>
    <line class="edge" x1="110" y1="148" x2="230" y2="278" style="animation-delay:0.56s"/>
    <line class="edge" x1="260" y1="132" x2="230" y2="278" style="animation-delay:0.62s"/>
    <line class="edge" x1="260" y1="132" x2="410" y2="252" style="animation-delay:0.68s"/>
    <line class="edge" x1="440" y1="155" x2="410" y2="252" style="animation-delay:0.74s"/>
    <line class="edge" x1="440" y1="155" x2="590" y2="270" style="animation-delay:0.80s"/>
    <line class="edge" x1="770" y1="145" x2="620" y2="270" style="animation-delay:0.86s"/>
    <line class="edge" x1="770" y1="145" x2="900" y2="275" style="animation-delay:0.92s"/>
    <line class="edge" x1="960" y1="158" x2="900" y2="275" style="animation-delay:0.98s"/>
    <line class="edge" x1="960" y1="158" x2="1070" y2="258" style="animation-delay:1.04s"/>
    <line class="edge" x1="1110" y1="140" x2="1070" y2="258" style="animation-delay:1.10s"/>
    <line class="edge" x1="1110" y1="140" x2="1165" y2="282" style="animation-delay:1.16s"/>

    <!-- Bottom row connections -->
    <line class="edge" x1="65"  y1="262" x2="230" y2="278" style="animation-delay:0.70s"/>
    <line class="edge" x1="230" y1="278" x2="410" y2="252" style="animation-delay:0.76s"/>
    <line class="edge" x1="410" y1="252" x2="590" y2="270" style="animation-delay:0.82s"/>
    <line class="edge" x1="590" y1="270" x2="760" y2="255" style="animation-delay:0.88s"/>
    <line class="edge" x1="760" y1="255" x2="900" y2="275" style="animation-delay:0.94s"/>
    <line class="edge" x1="900" y1="275" x2="1070" y2="258" style="animation-delay:1.00s"/>
    <line class="edge" x1="1070" y1="258" x2="1165" y2="282" style="animation-delay:1.06s"/>

    <!-- Cross connections for density -->
    <line class="edge" x1="70"  y1="50"  x2="260" y2="132" style="animation-delay:0.10s"/>
    <line class="edge" x1="370" y1="60"  x2="110" y2="148" style="animation-delay:0.22s"/>
    <line class="edge" x1="860" y1="38"  x2="1110" y2="140" style="animation-delay:0.34s"/>
    <line class="edge" x1="1150" y1="42" x2="960" y2="158" style="animation-delay:0.42s"/>
    <line class="edge" x1="65"  y1="262" x2="410" y2="252" style="animation-delay:0.78s"/>
    <line class="edge" x1="760" y1="255" x2="1070" y2="258" style="animation-delay:0.96s"/>
  </g>

  <!-- ═══ SIGNALS — dots traveling along edges ═══ -->
  <g>
    <!-- Top → Mid signals -->
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 70,50 L 110,148');    animation-delay:0.0s"/>
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 210,35 L 260,132');   animation-delay:0.5s"/>
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 370,60 L 440,155');   animation-delay:1.0s"/>
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 860,38 L 770,145');   animation-delay:1.5s"/>
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 1010,52 L 960,158');  animation-delay:2.0s"/>
    <circle class="sig" r="1.8" fill="#818cf8" style="offset-path:path('M 1150,42 L 1110,140');animation-delay:2.5s"/>

    <!-- Mid → Bottom signals -->
    <circle class="sig" r="1.8" fill="#a78bfa" style="offset-path:path('M 110,148 L 230,278'); animation-delay:0.8s"/>
    <circle class="sig" r="1.8" fill="#a78bfa" style="offset-path:path('M 260,132 L 410,252'); animation-delay:1.3s"/>
    <circle class="sig" r="1.8" fill="#a78bfa" style="offset-path:path('M 440,155 L 590,270'); animation-delay:1.8s"/>
    <circle class="sig" r="1.8" fill="#a78bfa" style="offset-path:path('M 770,145 L 900,275'); animation-delay:0.3s"/>
    <circle class="sig" r="1.8" fill="#a78bfa" style="offset-path:path('M 960,158 L 1070,258');animation-delay:2.3s"/>

    <!-- Horizontal signals -->
    <circle class="sig" r="1.5" fill="#6366f1" style="offset-path:path('M 70,50 L 210,35');     animation-delay:0.2s"/>
    <circle class="sig" r="1.5" fill="#6366f1" style="offset-path:path('M 530,42 L 700,55');    animation-delay:1.2s"/>
    <circle class="sig" r="1.5" fill="#6366f1" style="offset-path:path('M 860,38 L 1010,52');   animation-delay:0.7s"/>
    <circle class="sig" r="1.5" fill="#6366f1" style="offset-path:path('M 230,278 L 410,252');  animation-delay:1.7s"/>
    <circle class="sig" r="1.5" fill="#6366f1" style="offset-path:path('M 760,255 L 900,275');  animation-delay:2.2s"/>
  </g>

  <!-- ═══ NODES — 3 rows, drifting ═══ -->

  <!-- Top row (8 nodes) -->
  <g fill="#6366f1">
    <g class="f1" style="animation-delay:0s">
      <circle class="halo" cx="70" cy="50" r="8" opacity="0" style="--gr:4px;animation-delay:0s"/>
      <circle class="node" cx="70" cy="50" r="3.5" style="--r:3.5px;--o:0.22;animation-delay:0s"/>
    </g>
    <g class="f3" style="animation-delay:1s">
      <circle class="halo" cx="210" cy="35" r="9" opacity="0" style="animation-delay:0.4s"/>
      <circle class="node" cx="210" cy="35" r="4" style="--r:4px;--o:0.28;animation-delay:0.4s"/>
    </g>
    <g class="f5" style="animation-delay:2s">
      <circle class="halo" cx="370" cy="60" r="7" opacity="0" style="animation-delay:0.8s"/>
      <circle class="node" cx="370" cy="60" r="3" style="--r:3px;--o:0.20;animation-delay:0.8s"/>
    </g>
    <g class="f2" style="animation-delay:0.5s">
      <circle class="halo" cx="530" cy="42" r="8" opacity="0" style="animation-delay:1.2s"/>
      <circle class="node" cx="530" cy="42" r="3.5" style="--r:3.5px;--o:0.24;animation-delay:1.2s"/>
    </g>
    <g class="f4" style="animation-delay:1.5s">
      <circle class="halo" cx="700" cy="55" r="7" opacity="0" style="animation-delay:0.2s"/>
      <circle class="node" cx="700" cy="55" r="3" style="--r:3px;--o:0.20;animation-delay:0.2s"/>
    </g>
    <g class="f1" style="animation-delay:3s">
      <circle class="halo" cx="860" cy="38" r="9" opacity="0" style="animation-delay:0.6s"/>
      <circle class="node" cx="860" cy="38" r="4" style="--r:4px;--o:0.26;animation-delay:0.6s"/>
    </g>
    <g class="f3" style="animation-delay:0.8s">
      <circle class="halo" cx="1010" cy="52" r="8" opacity="0" style="animation-delay:1.0s"/>
      <circle class="node" cx="1010" cy="52" r="3.5" style="--r:3.5px;--o:0.22;animation-delay:1.0s"/>
    </g>
    <g class="f5" style="animation-delay:2.5s">
      <circle class="halo" cx="1150" cy="42" r="7" opacity="0" style="animation-delay:1.4s"/>
      <circle class="node" cx="1150" cy="42" r="3" style="--r:3px;--o:0.20;animation-delay:1.4s"/>
    </g>
  </g>

  <!-- Mid row (6 nodes) — near text, subtler -->
  <g fill="#818cf8">
    <g class="f2" style="animation-delay:0.3s">
      <circle class="halo" cx="110" cy="148" r="10" opacity="0" style="animation-delay:0.3s"/>
      <circle class="node" cx="110" cy="148" r="4.5" style="--r:4.5px;--o:0.30;animation-delay:0.3s"/>
    </g>
    <g class="f4" style="animation-delay:1.2s">
      <circle class="halo" cx="260" cy="132" r="9" opacity="0" style="animation-delay:0.7s"/>
      <circle class="node" cx="260" cy="132" r="4" style="--r:4px;--o:0.26;animation-delay:0.7s"/>
    </g>
    <g class="f1" style="animation-delay:2.2s">
      <circle class="halo" cx="440" cy="155" r="8" opacity="0" style="animation-delay:1.1s"/>
      <circle class="node" cx="440" cy="155" r="3.5" style="--r:3.5px;--o:0.18;animation-delay:1.1s"/>
    </g>
    <g class="f5" style="animation-delay:0.7s">
      <circle class="halo" cx="770" cy="145" r="8" opacity="0" style="animation-delay:0.5s"/>
      <circle class="node" cx="770" cy="145" r="3.5" style="--r:3.5px;--o:0.18;animation-delay:0.5s"/>
    </g>
    <g class="f3" style="animation-delay:1.8s">
      <circle class="halo" cx="960" cy="158" r="9" opacity="0" style="animation-delay:0.9s"/>
      <circle class="node" cx="960" cy="158" r="4" style="--r:4px;--o:0.26;animation-delay:0.9s"/>
    </g>
    <g class="f2" style="animation-delay:2.8s">
      <circle class="halo" cx="1110" cy="140" r="10" opacity="0" style="animation-delay:1.3s"/>
      <circle class="node" cx="1110" cy="140" r="4.5" style="--r:4.5px;--o:0.30;animation-delay:1.3s"/>
    </g>
  </g>

  <!-- Bottom row (8 nodes) -->
  <g fill="#a78bfa">
    <g class="f4" style="animation-delay:0.4s">
      <circle class="halo" cx="65" cy="262" r="8" opacity="0" style="animation-delay:0.2s"/>
      <circle class="node" cx="65" cy="262" r="3.5" style="--r:3.5px;--o:0.22;animation-delay:0.2s"/>
    </g>
    <g class="f1" style="animation-delay:1.4s">
      <circle class="halo" cx="230" cy="278" r="9" opacity="0" style="animation-delay:0.6s"/>
      <circle class="node" cx="230" cy="278" r="4" style="--r:4px;--o:0.26;animation-delay:0.6s"/>
    </g>
    <g class="f5" style="animation-delay:0.2s">
      <circle class="halo" cx="410" cy="252" r="7" opacity="0" style="animation-delay:1.0s"/>
      <circle class="node" cx="410" cy="252" r="3" style="--r:3px;--o:0.20;animation-delay:1.0s"/>
    </g>
    <g class="f3" style="animation-delay:2.4s">
      <circle class="halo" cx="590" cy="270" r="8" opacity="0" style="animation-delay:0.4s"/>
      <circle class="node" cx="590" cy="270" r="3.5" style="--r:3.5px;--o:0.22;animation-delay:0.4s"/>
    </g>
    <g class="f2" style="animation-delay:1.6s">
      <circle class="halo" cx="760" cy="255" r="7" opacity="0" style="animation-delay:0.8s"/>
      <circle class="node" cx="760" cy="255" r="3" style="--r:3px;--o:0.20;animation-delay:0.8s"/>
    </g>
    <g class="f4" style="animation-delay:0.9s">
      <circle class="halo" cx="900" cy="275" r="9" opacity="0" style="animation-delay:1.2s"/>
      <circle class="node" cx="900" cy="275" r="4" style="--r:4px;--o:0.26;animation-delay:1.2s"/>
    </g>
    <g class="f1" style="animation-delay:3.2s">
      <circle class="halo" cx="1070" cy="258" r="8" opacity="0" style="animation-delay:0.1s"/>
      <circle class="node" cx="1070" cy="258" r="3.5" style="--r:3.5px;--o:0.22;animation-delay:0.1s"/>
    </g>
    <g class="f5" style="animation-delay:1.1s">
      <circle class="halo" cx="1165" cy="282" r="7" opacity="0" style="animation-delay:1.5s"/>
      <circle class="node" cx="1165" cy="282" r="3" style="--r:3px;--o:0.20;animation-delay:1.5s"/>
    </g>
  </g>

  <!-- ═══ CENTER TEXT ═══ -->
  <rect class="accent-bar ab" x="500" y="198" width="200" height="1" rx="0.5" fill="#6366f1" opacity="0.2"/>

  <text class="header-name nm" x="600" y="155" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="34" font-weight="600" letter-spacing="3"
        fill="#e2e8f0">
    Daniil Kiselyov
  </text>

  <text class="header-role rl" x="600" y="228" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="400" letter-spacing="6"
        fill="#6366f1" opacity="0.6">
    ML ENGINEER
  </text>

  <rect x="0" y="318" width="1200" height="2" fill="url(#bl)"/>
</svg>
