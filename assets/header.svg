<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <style>
    /* ── Node pulse ── */
    @keyframes pulse {
      0%, 100% { r: var(--r); opacity: var(--o); }
      50%      { r: calc(var(--r) + 1.5px); opacity: calc(var(--o) + 0.15); }
    }
    /* ── Signal traveling along edge ── */
    @keyframes signal {
      0%   { offset-distance: 0%;   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    /* ── Glow ring around active nodes ── */
    @keyframes glow {
      0%, 100% { r: var(--gr); opacity: 0; }
      50%      { r: calc(var(--gr) + 6px); opacity: 0.12; }
    }
    /* ── Text entrance ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    /* ── Edge drawing ── */
    @keyframes edgeDraw {
      from { stroke-dashoffset: 500; }
      to   { stroke-dashoffset: 0; }
    }

    .nn-edge {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: edgeDraw 2s ease-out both;
    }
    .nn-node {
      animation: pulse 3s ease-in-out infinite;
    }
    .nn-glow {
      animation: glow 3s ease-in-out infinite;
    }
    .nn-signal {
      animation: signal 2.5s ease-in-out infinite;
    }
    .header-name {
      animation: fadeInUp 1s ease-out 0.6s both;
    }
    .header-role {
      animation: fadeInUp 1s ease-out 0.9s both;
    }
    .accent-bar {
      transform-origin: center;
      animation: barGrow 0.8s ease-out 1.2s both;
    }

    /* ── Light mode ── */
    @media (prefers-color-scheme: light) {
      .bg-rect { fill: #f8f9fc; }
      .nn-edge-line { stroke: #6366f1; stroke-opacity: 0.12; }
      .nn-node-circle { fill: #6366f1; }
      .nn-glow-circle { fill: #6366f1; }
      .nn-signal-dot { fill: #6366f1; }
      .name-text { fill: #0f172a; }
      .role-text { fill: #6366f1; opacity: 0.85; }
      .accent-rect { fill: #6366f1; opacity: 0.3; }
    }
  </style>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg-rect" width="1200" height="320" fill="#08080f"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- ═══════════ LEFT NEURAL NETWORK ═══════════ -->

  <!-- Edges: Layer 0 → Layer 1 -->
  <g class="nn-edge-line" stroke="#6366f1" stroke-opacity="0.07" stroke-width="0.8" fill="none">
    <line class="nn-edge" x1="90" y1="80"  x2="200" y2="55"  style="animation-delay:0.0s"/>
    <line class="nn-edge" x1="90" y1="80"  x2="200" y2="110" style="animation-delay:0.05s"/>
    <line class="nn-edge" x1="90" y1="80"  x2="200" y2="165" style="animation-delay:0.1s"/>
    <line class="nn-edge" x1="90" y1="160" x2="200" y2="55"  style="animation-delay:0.15s"/>
    <line class="nn-edge" x1="90" y1="160" x2="200" y2="110" style="animation-delay:0.2s"/>
    <line class="nn-edge" x1="90" y1="160" x2="200" y2="165" style="animation-delay:0.25s"/>
    <line class="nn-edge" x1="90" y1="240" x2="200" y2="110" style="animation-delay:0.3s"/>
    <line class="nn-edge" x1="90" y1="240" x2="200" y2="165" style="animation-delay:0.35s"/>
    <line class="nn-edge" x1="90" y1="240" x2="200" y2="220" style="animation-delay:0.4s"/>
    <!-- Layer 1 → Layer 2 -->
    <line class="nn-edge" x1="200" y1="55"  x2="310" y2="110" style="animation-delay:0.5s"/>
    <line class="nn-edge" x1="200" y1="110" x2="310" y2="110" style="animation-delay:0.55s"/>
    <line class="nn-edge" x1="200" y1="165" x2="310" y2="110" style="animation-delay:0.6s"/>
    <line class="nn-edge" x1="200" y1="55"  x2="310" y2="200" style="animation-delay:0.65s"/>
    <line class="nn-edge" x1="200" y1="165" x2="310" y2="200" style="animation-delay:0.7s"/>
    <line class="nn-edge" x1="200" y1="220" x2="310" y2="200" style="animation-delay:0.75s"/>
  </g>

  <!-- Signals — left network -->
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,80 L 200,55');  animation-delay:0.0s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,80 L 200,110'); animation-delay:0.4s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,160 L 200,165');animation-delay:0.8s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,240 L 200,110');animation-delay:1.2s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,160 L 200,55'); animation-delay:1.6s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 90,240 L 200,220');animation-delay:2.0s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 200,55 L 310,110'); animation-delay:1.0s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 200,165 L 310,200');animation-delay:1.5s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 200,110 L 310,110');animation-delay:2.0s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 200,220 L 310,200');animation-delay:0.5s"/>

  <!-- Left Layer 0 (Input — 3 nodes) -->
  <g class="nn-node-circle" fill="#6366f1">
    <circle class="nn-glow nn-glow-circle" cx="90" cy="80"  style="--gr:4px" r="8" fill="#6366f1" opacity="0"/>
    <circle class="nn-node" cx="90" cy="80"  style="--r:4px;--o:0.25;animation-delay:0.0s" r="4"/>
    <circle class="nn-glow nn-glow-circle" cx="90" cy="160" style="--gr:4px;animation-delay:0.5s" r="8" fill="#6366f1" opacity="0"/>
    <circle class="nn-node" cx="90" cy="160" style="--r:4px;--o:0.3;animation-delay:0.5s" r="4"/>
    <circle class="nn-glow nn-glow-circle" cx="90" cy="240" style="--gr:3.5px;animation-delay:1.0s" r="8" fill="#6366f1" opacity="0"/>
    <circle class="nn-node" cx="90" cy="240" style="--r:3.5px;--o:0.2;animation-delay:1.0s" r="3.5"/>
  </g>

  <!-- Left Layer 1 (Hidden — 4 nodes) -->
  <g class="nn-node-circle" fill="#818cf8">
    <circle class="nn-glow nn-glow-circle" cx="200" cy="55"  style="--gr:4px;animation-delay:0.3s" r="8" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="200" cy="55"  style="--r:3.5px;--o:0.3;animation-delay:0.3s" r="3.5"/>
    <circle class="nn-glow nn-glow-circle" cx="200" cy="110" style="--gr:5px;animation-delay:0.8s" r="10" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="200" cy="110" style="--r:4.5px;--o:0.35;animation-delay:0.8s" r="4.5"/>
    <circle class="nn-glow nn-glow-circle" cx="200" cy="165" style="--gr:4px;animation-delay:1.3s" r="8" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="200" cy="165" style="--r:3.5px;--o:0.28;animation-delay:1.3s" r="3.5"/>
    <circle class="nn-glow nn-glow-circle" cx="200" cy="220" style="--gr:3.5px;animation-delay:1.8s" r="7" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="200" cy="220" style="--r:3px;--o:0.22;animation-delay:1.8s" r="3"/>
  </g>

  <!-- Left Layer 2 (Output — 2 nodes) -->
  <g class="nn-node-circle" fill="#a78bfa">
    <circle class="nn-glow nn-glow-circle" cx="310" cy="110" style="--gr:5px;animation-delay:0.6s" r="10" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="310" cy="110" style="--r:5px;--o:0.35;animation-delay:0.6s" r="5"/>
    <circle class="nn-glow nn-glow-circle" cx="310" cy="200" style="--gr:4.5px;animation-delay:1.1s" r="9" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="310" cy="200" style="--r:4px;--o:0.3;animation-delay:1.1s" r="4"/>
  </g>

  <!-- ═══════════ RIGHT NEURAL NETWORK (mirrored) ═══════════ -->

  <!-- Edges -->
  <g class="nn-edge-line" stroke="#6366f1" stroke-opacity="0.07" stroke-width="0.8" fill="none">
    <line class="nn-edge" x1="890" y1="55"  x2="1000" y2="80"  style="animation-delay:0.1s"/>
    <line class="nn-edge" x1="890" y1="110" x2="1000" y2="80"  style="animation-delay:0.15s"/>
    <line class="nn-edge" x1="890" y1="165" x2="1000" y2="80"  style="animation-delay:0.2s"/>
    <line class="nn-edge" x1="890" y1="55"  x2="1000" y2="160" style="animation-delay:0.25s"/>
    <line class="nn-edge" x1="890" y1="110" x2="1000" y2="160" style="animation-delay:0.3s"/>
    <line class="nn-edge" x1="890" y1="165" x2="1000" y2="160" style="animation-delay:0.35s"/>
    <line class="nn-edge" x1="890" y1="110" x2="1000" y2="240" style="animation-delay:0.4s"/>
    <line class="nn-edge" x1="890" y1="165" x2="1000" y2="240" style="animation-delay:0.45s"/>
    <line class="nn-edge" x1="890" y1="220" x2="1000" y2="240" style="animation-delay:0.5s"/>
    <line class="nn-edge" x1="1000" y1="80"  x2="1110" y2="135" style="animation-delay:0.6s"/>
    <line class="nn-edge" x1="1000" y1="160" x2="1110" y2="135" style="animation-delay:0.65s"/>
    <line class="nn-edge" x1="1000" y1="240" x2="1110" y2="195" style="animation-delay:0.7s"/>
    <line class="nn-edge" x1="1000" y1="80"  x2="1110" y2="195" style="animation-delay:0.75s"/>
    <line class="nn-edge" x1="1000" y1="160" x2="1110" y2="195" style="animation-delay:0.8s"/>
    <line class="nn-edge" x1="1000" y1="240" x2="1110" y2="135" style="animation-delay:0.85s"/>
  </g>

  <!-- Signals — right network -->
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 890,55 L 1000,80');  animation-delay:0.3s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 890,165 L 1000,160');animation-delay:0.7s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 890,110 L 1000,240');animation-delay:1.1s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 890,220 L 1000,240');animation-delay:1.5s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#818cf8" style="offset-path:path('M 890,55 L 1000,160'); animation-delay:1.9s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 1000,80 L 1110,135'); animation-delay:0.8s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 1000,160 L 1110,195');animation-delay:1.3s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 1000,240 L 1110,135');animation-delay:1.8s"/>
  <circle class="nn-signal nn-signal-dot" r="2" fill="#a78bfa" style="offset-path:path('M 1000,80 L 1110,195'); animation-delay:2.2s"/>

  <!-- Right Layer 0 -->
  <g class="nn-node-circle" fill="#a78bfa">
    <circle class="nn-glow nn-glow-circle" cx="890" cy="55"  style="--gr:4px;animation-delay:0.2s" r="8" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="890" cy="55"  style="--r:3.5px;--o:0.28;animation-delay:0.2s" r="3.5"/>
    <circle class="nn-glow nn-glow-circle" cx="890" cy="110" style="--gr:5px;animation-delay:0.7s" r="10" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="890" cy="110" style="--r:4.5px;--o:0.35;animation-delay:0.7s" r="4.5"/>
    <circle class="nn-glow nn-glow-circle" cx="890" cy="165" style="--gr:4px;animation-delay:1.2s" r="8" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="890" cy="165" style="--r:3.5px;--o:0.28;animation-delay:1.2s" r="3.5"/>
    <circle class="nn-glow nn-glow-circle" cx="890" cy="220" style="--gr:3.5px;animation-delay:1.7s" r="7" fill="#a78bfa" opacity="0"/>
    <circle class="nn-node" cx="890" cy="220" style="--r:3px;--o:0.2;animation-delay:1.7s" r="3"/>
  </g>

  <!-- Right Layer 1 -->
  <g class="nn-node-circle" fill="#818cf8">
    <circle class="nn-glow nn-glow-circle" cx="1000" cy="80"  style="--gr:4px;animation-delay:0.4s" r="8" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="1000" cy="80"  style="--r:4px;--o:0.3;animation-delay:0.4s" r="4"/>
    <circle class="nn-glow nn-glow-circle" cx="1000" cy="160" style="--gr:4.5px;animation-delay:0.9s" r="9" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="1000" cy="160" style="--r:4px;--o:0.32;animation-delay:0.9s" r="4"/>
    <circle class="nn-glow nn-glow-circle" cx="1000" cy="240" style="--gr:4px;animation-delay:1.4s" r="8" fill="#818cf8" opacity="0"/>
    <circle class="nn-node" cx="1000" cy="240" style="--r:3.5px;--o:0.25;animation-delay:1.4s" r="3.5"/>
  </g>

  <!-- Right Layer 2 -->
  <g class="nn-node-circle" fill="#6366f1">
    <circle class="nn-glow nn-glow-circle" cx="1110" cy="135" style="--gr:5px;animation-delay:0.5s" r="10" fill="#6366f1" opacity="0"/>
    <circle class="nn-node" cx="1110" cy="135" style="--r:5px;--o:0.35;animation-delay:0.5s" r="5"/>
    <circle class="nn-glow nn-glow-circle" cx="1110" cy="195" style="--gr:4.5px;animation-delay:1.0s" r="9" fill="#6366f1" opacity="0"/>
    <circle class="nn-node" cx="1110" cy="195" style="--r:4px;--o:0.3;animation-delay:1.0s" r="4"/>
  </g>

  <!-- ═══════════ CENTER TEXT ═══════════ -->

  <rect class="accent-bar accent-rect" x="500" y="198" width="200" height="1" rx="0.5" fill="#6366f1" opacity="0.2"/>

  <text class="header-name name-text" x="600" y="155" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="34" font-weight="600" letter-spacing="3"
        fill="#e2e8f0">
    Даниил Киселёв
  </text>

  <text class="header-role role-text" x="600" y="228" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="400" letter-spacing="6"
        fill="#6366f1" opacity="0.6">
    ML ENGINEER
  </text>

  <rect x="0" y="318" width="1200" height="2" fill="url(#bottomLine)"/>
</svg>
